<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Discotti Pong</title>
  <meta name="description" content="Sfida gli amici a Discotti Pong: tieni in gioco il biscotto con la cassa audio.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Discotti Pong">
  <meta property="og:description" content="Tocca, trascina la cassa e fai rimbalzare il biscotto. Riuscirai a battere il record?">
  <meta property="og:image" content="share-card.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="theme-color" content="#0b2a92">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='27' fill='%23c98636'/%3E%3Ccircle cx='23' cy='22' r='4' fill='%23583019'/%3E%3Ccircle cx='40' cy='27' r='5' fill='%23583019'/%3E%3Ccircle cx='28' cy='42' r='4' fill='%23583019'/%3E%3C/svg%3E">
  <style>
    :root {
      color-scheme: light;
      --blue: #0b2a92;
      --ink: #0b2a92;
      --muted: rgba(11, 42, 146, .7);
      --bg: #f8fbff;
      --line: rgba(11, 42, 146, .22);
      --accent: #0b2a92;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: #dfeaff;
    }

    .game {
      position: relative;
      width: min(100vw, 430px);
      height: 100svh;
      max-height: 932px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background:
        linear-gradient(180deg, rgba(11, 42, 146, .05), rgba(255, 255, 255, .98) 45%),
        var(--bg);
      box-shadow: 0 0 0 1px rgba(11, 42, 146, .12), 0 18px 70px rgba(11, 42, 146, .14);
    }

    .topbar,
    .bottombar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: max(12px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) 10px max(10px, env(safe-area-inset-left));
      pointer-events: none;
    }

    .topbar {
      grid-row: 1;
    }

    .bottombar {
      grid-row: 3;
      padding: 8px 14px max(14px, env(safe-area-inset-bottom));
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      text-align: center;
    }

    .brand {
      min-width: 0;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
      font-size: clamp(16px, 4.7vw, 28px);
      color: var(--ink);
      text-shadow: 0 2px 0 rgba(255, 255, 255, .9);
      white-space: nowrap;
    }

    .title-block {
      min-width: 0;
      flex: 1 1 auto;
    }

    .player {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stats {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .pill {
      min-width: 50px;
      padding: 6px 7px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .86);
      text-align: center;
      font-weight: 800;
      font-size: 14px;
      line-height: 1;
      box-shadow: 0 8px 24px rgba(11, 42, 146, .08), inset 0 1px rgba(255, 255, 255, .9);
    }

    .pill span {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
    }

    @media (max-width: 370px) {
      .brand { font-size: 15px; }
      .player { max-width: 116px; font-size: 10px; }
      .stats { gap: 4px; }
      .pill {
        min-width: 44px;
        padding: 5px 5px;
        font-size: 13px;
      }
      .pill span { font-size: 8px; }
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(255, 255, 255, .66);
      backdrop-filter: blur(5px);
    }

    .panel {
      width: min(360px, 100%);
      border: 1px solid rgba(11, 42, 146, .2);
      border-radius: 8px;
      background: rgba(255, 255, 255, .94);
      padding: 18px;
      box-shadow: 0 18px 50px rgba(11, 42, 146, .18);
      display: flex;
      flex-direction: column;
      text-align: center;
    }

    .panel h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 10vw, 46px);
      line-height: .9;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .panel p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    .nickname-label {
      display: block;
      margin: 0 0 6px;
      color: var(--ink);
      font-size: 11px;
      font-weight: 900;
      text-align: left;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      height: 44px;
      margin: 0 0 12px;
      border: 1px solid rgba(11, 42, 146, .26);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      font-size: 16px;
      font-weight: 800;
      outline: 0;
      padding: 0 12px;
      text-align: center;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(11, 42, 146, .12);
    }

    .actions {
      display: grid;
      gap: 10px;
    }

    button {
      width: 100%;
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      font: inherit;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 0 #061b64;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #061b64;
    }

    .secondary {
      background: #ffffff;
      color: var(--ink);
      border: 1px solid rgba(11, 42, 146, .28);
      box-shadow: 0 4px 0 rgba(11, 42, 146, .18);
    }

    .hint {
      min-height: 16px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .leaderboard {
      margin-top: 12px;
      border-top: 1px solid rgba(11, 42, 146, .14);
      padding-top: 10px;
      text-align: left;
    }

    .leaderboard-title {
      margin: 0 0 8px;
      color: var(--ink);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .leaderboard-list {
      display: grid;
      gap: 5px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .leaderboard-row {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      align-items: center;
      gap: 8px;
      min-height: 24px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
    }

    .leaderboard-rank {
      color: var(--muted);
      font-size: 11px;
      text-align: right;
    }

    .leaderboard-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .leaderboard-score {
      min-width: 28px;
      text-align: right;
    }

    .leaderboard-row.is-player {
      border-radius: 6px;
      background: rgba(11, 42, 146, .08);
      padding: 0 4px;
    }

    .challenge {
      display: none;
      margin: 4px 0 12px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
      line-height: 1.3;
    }

    .overlay.is-game-over .challenge {
      display: block;
      order: 2;
    }

    .overlay.mode-welcome .nickname-label,
    .overlay.mode-welcome input,
    .overlay.mode-welcome .hint,
    .overlay.mode-welcome #shareButton,
    .overlay.mode-welcome .leaderboard {
      display: none;
    }

    .overlay.mode-nickname #shareButton,
    .overlay.mode-nickname .leaderboard {
      display: none;
    }

    .overlay.is-game-over .nickname-label,
    .overlay.is-game-over input,
    .overlay.is-game-over .hint {
      display: none;
    }

    .overlay.is-game-over .leaderboard {
      order: 3;
      margin-top: 2px;
      margin-bottom: 14px;
      border-top: 0;
      padding-top: 0;
    }

    .overlay.is-game-over .actions {
      order: 4;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="game" aria-label="Discotti Pong">
    <canvas id="gameCanvas"></canvas>

    <header class="topbar">
      <div class="title-block">
        <div class="brand">Discotti Pong</div>
        <div class="player" id="playerBadge">Inserisci nickname</div>
      </div>
      <div class="stats" aria-live="polite">
        <div class="pill"><span>Punti</span><b id="score">0</b></div>
        <div class="pill"><span>Combo</span><b id="combo">0</b></div>
        <div class="pill"><span>Best</span><b id="best">0</b></div>
      </div>
    </header>

    <footer class="bottombar">Trascina la cassa audio. Fai rimbalzare il biscotto.</footer>

    <section class="overlay" id="overlay">
      <div class="panel">
        <h1 id="overlayTitle">Discotti Pong</h1>
        <p id="overlayText">Tocca Gioca e preparati a far rimbalzare il biscotto.</p>
        <label class="nickname-label" for="nicknameInput">Nickname</label>
        <input id="nicknameInput" type="text" maxlength="14" autocomplete="nickname" inputmode="text" placeholder="Es. Matteo">
        <div class="actions">
          <button id="startButton" type="button">Gioca</button>
          <button id="shareButton" class="secondary" type="button">Condividi su WhatsApp</button>
        </div>
        <p class="hint" id="saveHint">Il nickname resta salvato su questo telefono.</p>
        <p class="challenge" id="challengeText"></p>
        <div class="leaderboard" aria-live="polite">
          <p class="leaderboard-title" id="leaderboardTitle">Classifica</p>
          <ol class="leaderboard-list" id="leaderboardList">
            <li class="leaderboard-row"><span class="leaderboard-rank">-</span><span class="leaderboard-name">Caricamento</span><span class="leaderboard-score">...</span></li>
          </ol>
        </div>
      </div>
    </section>
  </main>

  <script>
    const game = document.querySelector(".game");
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d", { alpha: false });
    const scoreEl = document.getElementById("score");
    const comboEl = document.getElementById("combo");
    const bestEl = document.getElementById("best");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const startButton = document.getElementById("startButton");
    const shareButton = document.getElementById("shareButton");
    const nicknameInput = document.getElementById("nicknameInput");
    const playerBadge = document.getElementById("playerBadge");
    const saveHint = document.getElementById("saveHint");
    const challengeText = document.getElementById("challengeText");
    const leaderboardTitle = document.getElementById("leaderboardTitle");
    const leaderboardList = document.getElementById("leaderboardList");
    const logo = new Image();
    logo.src = "DiscottiLogo-bg.png";
    const leaderboardApiBase = "https://discotti-pong-leaderboard.discotti-pong-matteopastena98-blip.workers.dev";
    const horseSpriteCache = new Map();

    const state = {
      width: 0,
      height: 0,
      dpr: 1,
      running: false,
      score: 0,
      level: 1,
      combo: 0,
      bestCombo: 0,
      perfects: 0,
      nonPerfectStreak: 0,
      horsePointCarry: 0,
      bassDropUntil: 0,
      bassBoost: null,
      nextBassAt: 30,
      cornerStreak: 0,
      cornerChainUntil: 0,
      cornerPulseUntil: 0,
      cornerPulseSide: "",
      cornerBurstUntil: 0,
      cornerBurstSide: "",
      slowUntil: 0,
      milkUntil: 0,
      milkCharges: 0,
      doubleUntil: 0,
      delayUntil: 0,
      splitAtScore: 35,
      splitCookies: null,
      splitMerge: null,
      lsdUntil: 0,
      nextLsdAtScore: 48,
      lsdDecoys: [],
      horseUntil: 0,
      horseFadeUntil: 0,
      horseHorde: [],
      majorEventCooldownUntil: 0,
      perk: null,
      nextPerkAt: 16,
      flashText: "",
      flashUntil: 0,
      best: Number(localStorage.getItem("discotti-pong-best") || 0),
      nickname: localStorage.getItem("discotti-pong-nickname") || "",
      leaderboard: [],
      overlayMode: "welcome",
      inputReadyAt: 0,
      last: 0,
      elapsed: 0,
      shake: 0,
      cookie: { x: 0, y: 0, r: 18, vx: 220, vy: -320, spin: 0, cornerArmed: false },
      speaker: { x: 0, y: 0, baseW: 108, w: 108, h: 28, targetX: 0 }
    };

    const music = {
      context: null,
      master: null,
      noise: null,
      timer: null,
      nextTime: 0,
      step: 0,
      bpm: 124
    };

    logo.addEventListener("load", () => {
      if (!state.running) {
        drawBackground();
        drawSpeaker();
        drawCookie();
      }
    });

    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
    const rand = (min, max) => min + Math.random() * (max - min);

    bestEl.textContent = state.best;
    comboEl.textContent = state.combo;
    nicknameInput.value = state.nickname;
    updateNicknameUI();
    setOverlayMode("welcome");

    function cleanNickname(value) {
      return value.trim().replace(/\s+/g, " ").slice(0, 14);
    }

    function getLockedNickname() {
      return cleanNickname(localStorage.getItem("discotti-pong-nickname") || "");
    }

    function isNicknameLocked() {
      return Boolean(getLockedNickname());
    }

    function apiUrl(path) {
      return `${leaderboardApiBase}${path}`;
    }

    function hasLeaderboardApi() {
      return Boolean(leaderboardApiBase) || !window.location.hostname.endsWith("github.io");
    }

    function updateNicknameUI() {
      playerBadge.textContent = state.nickname ? `Player: ${state.nickname}` : "Inserisci nickname";
      nicknameInput.readOnly = isNicknameLocked();
    }

    function setOverlayMode(mode) {
      state.overlayMode = mode;
      overlay.classList.remove("mode-welcome", "mode-nickname", "is-game-over");

      if (mode === "welcome") {
        overlay.classList.add("mode-welcome");
        overlayTitle.textContent = "Discotti Pong";
        overlayText.textContent = "Tocca Gioca e preparati a far rimbalzare il biscotto.";
        startButton.textContent = "Gioca";
        return;
      }

      if (mode === "nickname") {
        overlay.classList.add("mode-nickname");
        state.inputReadyAt = performance.now() + 350;
        overlayTitle.textContent = "Nickname";
        overlayText.textContent = isNicknameLocked() ? "Nickname gia scelto su questo telefono." : "Inserisci il nickname per iniziare la partita.";
        startButton.textContent = "Inizia";
        saveHint.textContent = isNicknameLocked() ? "Il nickname e bloccato su questo telefono." : "Sceglilo bene: poi resta quello.";
        if (!isNicknameLocked()) {
          requestAnimationFrame(() => nicknameInput.focus());
        }
        return;
      }

      if (mode === "gameover") {
        overlay.classList.add("is-game-over");
        overlayTitle.textContent = "Classifica di oggi";
        overlayText.textContent = `${state.score} punti - combo ${state.bestCombo} - perfect ${state.perfects}`;
        challengeText.textContent = "Aggiorno la classifica...";
        startButton.textContent = "Riprova";
      }
    }

    function renderLeaderboard(rows, offline, period = "today") {
      leaderboardTitle.textContent = period === "today" ? "Classifica di oggi" : "Classifica generale";
      const list = rows && rows.length ? rows : [{ nickname: "Nessun punteggio", score: 0 }];
      leaderboardList.innerHTML = list.slice(0, 8).map((row, index) => `
        <li class="leaderboard-row${row.nickname === state.nickname ? " is-player" : ""}">
          <span class="leaderboard-rank">${rows && rows.length ? index + 1 : "-"}</span>
          <span class="leaderboard-name">${escapeHtml(row.nickname || "Player")}</span>
          <span class="leaderboard-score">${Number(row.score || 0)}</span>
        </li>
      `).join("");

      updateChallengeText(rows || []);

      if (offline) {
        saveHint.textContent = "Classifica locale: server non raggiungibile.";
      }
    }

    function updateChallengeText(rows) {
      if (state.overlayMode !== "gameover") return;

      const playerIndex = rows.findIndex((row) => row.nickname === state.nickname);
      if (!rows.length) {
        challengeText.textContent = "Primo punteggio della giornata. Adesso fatti superare.";
        startButton.textContent = "Riprova";
        return;
      }

      if (playerIndex === 0) {
        challengeText.textContent = "Sei primo oggi. Ora difendi il posto.";
        startButton.textContent = "Difendi il primo posto";
        return;
      }

      if (playerIndex > 0) {
        const target = rows[playerIndex - 1];
        const missing = Number(target.score || 0) - state.score + 1;
        challengeText.textContent = `Sei #${playerIndex + 1}. Ti mancano ${missing} punti per superare ${target.nickname}.`;
        startButton.textContent = `Supera ${target.nickname}`;
        return;
      }

      const last = rows[rows.length - 1];
      const missing = Math.max(1, Number(last.score || 0) - state.score + 1);
      challengeText.textContent = rows.length >= 8
        ? `Ti mancano ${missing} punti per entrare in top 8 oggi.`
        : "Non sei ancora in classifica oggi. Basta una run pulita.";
      startButton.textContent = "Entra in classifica";
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function getLocalLeaderboard() {
      try {
        return JSON.parse(localStorage.getItem("discotti-pong-local-leaderboard") || "[]");
      } catch (error) {
        return [];
      }
    }

    function saveLocalScore(nickname, score) {
      const existing = getLocalLeaderboard().find((row) => row.nickname === nickname);
      const bestScore = Math.max(score, Number(existing && existing.score) || 0);
      const rows = getLocalLeaderboard().filter((row) => row.nickname !== nickname);
      rows.push({ nickname, score: bestScore, best_combo: state.bestCombo, perfects: state.perfects, at: Date.now() });
      rows.sort((a, b) => b.score - a.score || a.at - b.at);
      localStorage.setItem("discotti-pong-local-leaderboard", JSON.stringify(rows.slice(0, 8)));
      return rows.slice(0, 8);
    }

    async function loadLeaderboard() {
      if (!hasLeaderboardApi()) {
        state.leaderboard = getLocalLeaderboard();
        renderLeaderboard(state.leaderboard, true, "today");
        return;
      }

      try {
        const response = await fetch(apiUrl("/api/leaderboard?period=today"), { cache: "no-store" });
        if (!response.ok) throw new Error("leaderboard unavailable");
        const data = await response.json();
        state.leaderboard = Array.isArray(data.scores) ? data.scores : [];
        renderLeaderboard(state.leaderboard, false, "today");
      } catch (error) {
        state.leaderboard = getLocalLeaderboard();
        renderLeaderboard(state.leaderboard, true, "today");
      }
    }

    async function submitScore() {
      if (!state.nickname || state.score <= 0) {
        await loadLeaderboard();
        return;
      }
      const localRows = saveLocalScore(state.nickname, state.score);

      if (!hasLeaderboardApi()) {
        state.leaderboard = localRows;
        renderLeaderboard(localRows, true, "today");
        return;
      }

      try {
        const response = await fetch(apiUrl("/api/score"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            nickname: state.nickname,
            score: state.score,
            bestCombo: state.bestCombo,
            perfects: state.perfects
          })
        });
        if (!response.ok) throw new Error("score rejected");
        const data = await response.json();
        state.leaderboard = Array.isArray(data.scores) ? data.scores : localRows;
        renderLeaderboard(state.leaderboard, false, "today");
      } catch (error) {
        state.leaderboard = localRows;
        renderLeaderboard(localRows, true, "today");
      }
    }

    function saveNickname(required) {
      const lockedNickname = getLockedNickname();
      if (lockedNickname) {
        state.nickname = lockedNickname;
        nicknameInput.value = lockedNickname;
        saveHint.textContent = "Il nickname e bloccato su questo telefono.";
        updateNicknameUI();
        return true;
      }

      const nickname = cleanNickname(nicknameInput.value);
      if (!nickname && required) {
        saveHint.textContent = "Scrivi un nickname per iniziare.";
        nicknameInput.focus();
        return false;
      }

      if (nickname) {
        state.nickname = nickname;
        localStorage.setItem("discotti-pong-nickname", nickname);
        nicknameInput.value = nickname;
        saveHint.textContent = "Nickname salvato e bloccato su questo telefono.";
      }

      updateNicknameUI();
      return true;
    }

    function getCleanUrl() {
      const url = new URL(window.location.href);
      url.search = "";
      url.hash = "";
      return url.href;
    }

    function ensureMusic() {
      const AudioEngine = window.AudioContext || window.webkitAudioContext;
      if (!AudioEngine) return null;

      if (!music.context) {
        music.context = new AudioEngine();
        music.master = music.context.createGain();
        music.master.gain.value = .62;
        music.master.connect(music.context.destination);
        music.noise = createNoiseBuffer();
      }

      return music.context;
    }

    function createNoiseBuffer() {
      const ctx = music.context;
      const buffer = ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i += 1) {
        data[i] = Math.random() * 2 - 1;
      }
      return buffer;
    }

    function startSoundtrack() {
      const ctx = ensureMusic();
      if (!ctx || music.timer) return;

      ctx.resume();
      music.step = 0;
      music.nextTime = ctx.currentTime + .04;
      music.timer = window.setInterval(scheduleMusic, 25);
    }

    function stopSoundtrack() {
      if (!music.timer) return;
      window.clearInterval(music.timer);
      music.timer = null;
    }

    function scheduleMusic() {
      const ctx = music.context;
      if (!ctx) return;

      const lookAhead = .14;
      const stepTime = 60 / music.bpm / 4;

      while (music.nextTime < ctx.currentTime + lookAhead) {
        scheduleMusicStep(music.step % 16, music.nextTime);
        music.nextTime += stepTime;
        music.step = (music.step + 1) % 16;
      }
    }

    function scheduleMusicStep(step, time) {
      if (step % 4 === 0) playKick(time);
      if (step === 4 || step === 12) playClap(time);
      if (step % 4 === 2) {
        playHat(time, true);
        playBass(time, [55, 65.41, 61.74, 73.42][Math.floor(step / 4)]);
      } else if (step % 2 === 1) {
        playHat(time, false);
      }
    }

    function playKick(time) {
      const ctx = music.context;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(142, time);
      osc.frequency.exponentialRampToValueAtTime(43, time + .16);
      gain.gain.setValueAtTime(.98, time);
      gain.gain.exponentialRampToValueAtTime(.001, time + .32);

      osc.connect(gain);
      gain.connect(music.master);
      osc.start(time);
      osc.stop(time + .34);
    }

    function playClap(time) {
      for (let i = 0; i < 3; i += 1) {
        const t = time + i * .014;
        const src = music.context.createBufferSource();
        const filter = music.context.createBiquadFilter();
        const gain = music.context.createGain();

        src.buffer = music.noise;
        filter.type = "bandpass";
        filter.frequency.setValueAtTime(1600 + i * 260, t);
        filter.Q.value = .8;
      gain.gain.setValueAtTime(.24, t);
        gain.gain.exponentialRampToValueAtTime(.001, t + .13);

        src.connect(filter);
        filter.connect(gain);
        gain.connect(music.master);
        src.start(t);
        src.stop(t + .16);
      }
    }

    function playHat(time, open) {
      const src = music.context.createBufferSource();
      const filter = music.context.createBiquadFilter();
      const gain = music.context.createGain();
      const length = open ? .17 : .045;

      src.buffer = music.noise;
      filter.type = "highpass";
      filter.frequency.setValueAtTime(open ? 6200 : 7600, time);
      gain.gain.setValueAtTime(open ? .18 : .11, time);
      gain.gain.exponentialRampToValueAtTime(.001, time + length);

      src.connect(filter);
      filter.connect(gain);
      gain.connect(music.master);
      src.start(time);
      src.stop(time + length + .02);
    }

    function playBass(time, frequency) {
      const osc = music.context.createOscillator();
      const filter = music.context.createBiquadFilter();
      const gain = music.context.createGain();

      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(frequency, time);
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(320, time);
      filter.Q.value = 5;
      gain.gain.setValueAtTime(.001, time);
      gain.gain.linearRampToValueAtTime(.23, time + .018);
      gain.gain.exponentialRampToValueAtTime(.001, time + .22);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(music.master);
      osc.start(time);
      osc.stop(time + .24);
    }

    function playHorseNeigh() {
      const ctx = music.context || ensureMusic();
      if (!ctx || !music.master) return;
      ctx.resume();

      const time = ctx.currentTime + .01;
      const out = ctx.createGain();
      out.gain.setValueAtTime(.001, time);
      out.gain.linearRampToValueAtTime(.26, time + .035);
      out.gain.exponentialRampToValueAtTime(.001, time + .72);
      out.connect(music.master);

      for (let i = 0; i < 2; i += 1) {
        const osc = ctx.createOscillator();
        const filter = ctx.createBiquadFilter();
        const gain = ctx.createGain();
        const t = time + i * .07;

        osc.type = i ? "triangle" : "sawtooth";
        osc.frequency.setValueAtTime(520 + i * 80, t);
        osc.frequency.linearRampToValueAtTime(780 + i * 110, t + .12);
        osc.frequency.exponentialRampToValueAtTime(240 + i * 45, t + .48);
        filter.type = "bandpass";
        filter.frequency.setValueAtTime(980 + i * 220, t);
        filter.Q.value = 5.5;
        gain.gain.setValueAtTime(.001, t);
        gain.gain.linearRampToValueAtTime(.16, t + .04);
        gain.gain.exponentialRampToValueAtTime(.001, t + .55);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(out);
        osc.start(t);
        osc.stop(t + .58);
      }

      if (music.noise) {
        const src = ctx.createBufferSource();
        const filter = ctx.createBiquadFilter();
        const gain = ctx.createGain();
        src.buffer = music.noise;
        filter.type = "bandpass";
        filter.frequency.setValueAtTime(1450, time);
        filter.frequency.exponentialRampToValueAtTime(760, time + .44);
        filter.Q.value = 4;
        gain.gain.setValueAtTime(.001, time);
        gain.gain.linearRampToValueAtTime(.06, time + .05);
        gain.gain.exponentialRampToValueAtTime(.001, time + .46);
        src.connect(filter);
        filter.connect(gain);
        gain.connect(out);
        src.start(time);
        src.stop(time + .5);
      }
    }

    function getShareText() {
      const nickname = getLockedNickname() || state.nickname;
      if (state.score > 0) {
        const name = nickname || "Io";
        return `${name} ha fatto ${state.score} punti a Discotti Pong. Superami se ci riesci: ${getCleanUrl()}`;
      }

      const intro = nickname ? `${nickname} ti sfida a Discotti Pong!` : "Ti sfido a Discotti Pong!";
      return `${intro} Fai piu punti di me: ${getCleanUrl()}`;
    }

    async function shareGame(event) {
      event.preventDefault();
      event.stopPropagation();
      saveNickname(false);
      const url = getCleanUrl();
      const text = getShareText();

      if (navigator.share) {
        try {
          await navigator.share({ title: "Discotti Pong", text, url });
          return;
        } catch (error) {
          if (error && error.name === "AbortError") return;
        }
      }

      window.location.href = `https://wa.me/?text=${encodeURIComponent(text)}`;
    }

    function resize() {
      const bounds = game.getBoundingClientRect();
      state.dpr = Math.min(window.devicePixelRatio || 1, 2);
      state.width = bounds.width;
      state.height = bounds.height;
      canvas.width = Math.floor(state.width * state.dpr);
      canvas.height = Math.floor(state.height * state.dpr);
      canvas.style.width = state.width + "px";
      canvas.style.height = state.height + "px";
      ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);

      state.cookie.r = clamp(state.width * .047, 15, 25);
      state.speaker.baseW = clamp(state.width * .3, 92, 138);
      state.speaker.h = clamp(state.width * .075, 24, 34);
      state.speaker.y = state.height - Math.max(88, state.height * .13);
      applyDifficulty();
      state.speaker.x = clamp(state.speaker.x || state.width / 2, state.speaker.w / 2 + 10, state.width - state.speaker.w / 2 - 10);
      state.speaker.targetX = state.speaker.x;

      if (!state.running && state.cookie.x === 0 && state.cookie.y === 0) {
        state.cookie.x = state.width / 2;
        state.cookie.y = state.height * .44;
      }

      if (!state.running) {
        requestAnimationFrame(() => {
          drawBackground();
          drawHorseHorde();
          drawPerk();
          drawBassBoost();
          drawSpeaker();
          drawCookie();
        });
      }
    }

    function reset() {
      state.score = 0;
      state.level = 1;
      state.combo = 0;
      state.bestCombo = 0;
      state.perfects = 0;
      state.nonPerfectStreak = 0;
      state.horsePointCarry = 0;
      state.bassDropUntil = 0;
      state.bassBoost = null;
      state.nextBassAt = 30;
      state.cornerStreak = 0;
      state.cornerChainUntil = 0;
      state.cornerPulseUntil = 0;
      state.cornerPulseSide = "";
      state.cornerBurstUntil = 0;
      state.cornerBurstSide = "";
      state.slowUntil = 0;
      state.milkUntil = 0;
      state.milkCharges = 0;
      state.doubleUntil = 0;
      state.delayUntil = 0;
      state.splitAtScore = 35;
      state.splitCookies = null;
      state.splitMerge = null;
      state.lsdUntil = 0;
      state.nextLsdAtScore = 48;
      state.lsdDecoys = [];
      state.horseUntil = 0;
      state.horseFadeUntil = 0;
      state.horseHorde = [];
      state.majorEventCooldownUntil = 0;
      state.perk = null;
      state.nextPerkAt = 16;
      state.flashText = "";
      state.flashUntil = 0;
      state.elapsed = 0;
      state.shake = 0;
      scoreEl.textContent = "0";
      comboEl.textContent = "0";
      applyDifficulty();
      state.cookie.x = state.width / 2;
      state.cookie.y = state.height * .45;
      state.cookie.vx = (Math.random() < .5 ? -1 : 1) * rand(Math.max(145, state.width * .38), Math.max(230, state.width * .68));
      state.cookie.vy = -Math.max(280, state.height * .38);
      state.cookie.spin = 0;
      state.cookie.cornerArmed = false;
      state.speaker.x = state.width / 2;
      state.speaker.targetX = state.speaker.x;
      state.last = performance.now();
    }

    function start() {
      if (state.running) return;
      if (!saveNickname(true)) return;
      overlay.classList.remove("mode-welcome", "mode-nickname", "is-game-over");
      overlay.classList.add("hidden");
      reset();
      state.running = true;
      startSoundtrack();
      requestAnimationFrame(loop);
    }

    function gameOver() {
      state.running = false;
      stopSoundtrack();
      setOverlayMode("gameover");
      overlay.classList.remove("hidden");
      submitScore();
    }

    function getDifficulty() {
      const level = clamp(Math.floor(state.score / 5) + 1, 1, 7);
      return {
        level,
        speed: 1 + Math.min(state.score, 70) * .014 + (level - 1) * .025,
        paddleScale: Math.max(.58, 1 - Math.min(state.score, 65) * .0065),
        curve: state.score < 4 ? 0 : Math.min(118, (state.score - 3) * 4.2),
        wallChaos: Math.min(76, 24 + (level - 1) * 8),
        impactBoost: 235 + level * 24,
        minSideSpeed: 145 + level * 12
      };
    }

    function isBassDropActive() {
      return performance.now() < state.bassDropUntil;
    }

    function isSlowActive() {
      return performance.now() < state.slowUntil;
    }

    function isMilkActive() {
      return performance.now() < state.milkUntil && state.milkCharges > 0;
    }

    function isDoubleActive() {
      return performance.now() < state.doubleUntil;
    }

    function isDelayActive() {
      return performance.now() < state.delayUntil;
    }

    function isLsdActive() {
      return performance.now() < state.lsdUntil;
    }

    function isHorseActive() {
      return performance.now() < state.horseUntil;
    }

    function isHorseVisible() {
      return performance.now() < state.horseFadeUntil;
    }

    function cookieRadius(cookie) {
      return cookie.r;
    }

    function getPerfectHalfWidth() {
      const s = state.speaker;
      return clamp(s.w * .085, 6, 13);
    }

    function applyDifficulty() {
      const difficulty = getDifficulty();
      state.level = difficulty.level;
      state.speaker.w = state.speaker.baseW * difficulty.paddleScale;
      state.speaker.x = clamp(state.speaker.x || state.width / 2, state.speaker.w / 2 + 10, state.width - state.speaker.w / 2 - 10);
      state.speaker.targetX = clamp(state.speaker.targetX || state.speaker.x, state.speaker.w / 2 + 10, state.width - state.speaker.w / 2 - 10);
      return difficulty;
    }

    function setSpeakerFromClientX(clientX) {
      const bounds = game.getBoundingClientRect();
      const localX = clientX - bounds.left;
      state.speaker.targetX = clamp(localX, state.speaker.w / 2 + 10, state.width - state.speaker.w / 2 - 10);
    }

    function setSpeakerFromTouch(event) {
      if (isInteractiveTarget(event.target)) return;
      const touch = event.touches[0] || event.changedTouches[0];
      if (!touch) return;
      setSpeakerFromClientX(touch.clientX);
      event.preventDefault();
    }

    function handleStartInput(event) {
      if (event.target && event.target.closest && event.target.closest("input, #shareButton")) return;
      event.preventDefault();
      if (state.overlayMode === "welcome") {
        if (isNicknameLocked()) {
          start();
          return;
        }
        setOverlayMode("nickname");
        return;
      }
      if (state.overlayMode === "nickname" && performance.now() < state.inputReadyAt) return;
      start();
    }

    function isInteractiveTarget(target) {
      return target && target.closest && target.closest("input, button, textarea, select, label");
    }

    window.addEventListener("resize", resize);
    window.addEventListener("pointermove", (event) => setSpeakerFromClientX(event.clientX), { passive: true });
    window.addEventListener("pointerdown", (event) => {
      setSpeakerFromClientX(event.clientX);
      if (!state.running && overlay.classList.contains("hidden")) start();
    }, { passive: true });
    window.addEventListener("touchstart", setSpeakerFromTouch, { passive: false });
    window.addEventListener("touchmove", setSpeakerFromTouch, { passive: false });
    startButton.addEventListener("pointerdown", handleStartInput);
    startButton.addEventListener("touchstart", handleStartInput, { passive: false });
    startButton.addEventListener("click", handleStartInput);
    shareButton.addEventListener("pointerdown", (event) => event.stopPropagation());
    shareButton.addEventListener("touchstart", (event) => event.stopPropagation(), { passive: true });
    shareButton.addEventListener("click", shareGame);
    nicknameInput.addEventListener("input", () => {
      saveHint.textContent = isNicknameLocked() ? "Il nickname e bloccato su questo telefono." : "Sceglilo bene: poi resta quello.";
    });
    overlay.addEventListener("pointerdown", handleStartInput);
    overlay.addEventListener("touchstart", handleStartInput, { passive: false });
    overlay.addEventListener("click", handleStartInput);

    function update(dt) {
      const speaker = state.speaker;
      const difficulty = applyDifficulty();
      const speedScale = difficulty.speed * (isSlowActive() ? .76 : 1);

      state.elapsed += dt;
      speaker.x += (speaker.targetX - speaker.x) * Math.min(1, dt * 18);
      state.shake = Math.max(0, state.shake - dt * 18);
      updateCornerChain();
      updateBassBoost(dt);
      updateLsdDecoys(dt);
      updateHorseHorde(dt);
      maybeSpawnPerk();
      maybeStartSplit();
      maybeStartLsd();

      if (state.splitMerge) {
        updateSplitMerge();
        return;
      }

      const cookies = state.splitCookies || [state.cookie];
      for (const cookie of cookies) {
        updateCookie(cookie, dt, difficulty, speedScale);
        checkBassBoostHit(cookie);
        checkPerkHit(cookie);
        if (cookie.y - cookieRadius(cookie) > state.height) {
          gameOver();
          return;
        }
      }
    }

    function updateCookie(cookie, dt, difficulty, speedScale) {
      const radius = cookieRadius(cookie);
      if (difficulty.curve) {
        const wave = Math.sin(state.elapsed * (1.2 + difficulty.level * .18) + cookie.x * .01);
        cookie.vx = clamp(cookie.vx + wave * difficulty.curve * dt * .55, -560, 560);
      }

      cookie.vy += 34 * dt;
      cookie.vx *= 1 - Math.min(.05, dt * .35);
      cookie.x += cookie.vx * speedScale * dt;
      cookie.y += cookie.vy * speedScale * dt;
      cookie.spin += cookie.vx * dt * .015;

      if (cookie.x < radius + 10) {
        cookie.x = radius + 10;
        cookie.vx = Math.abs(cookie.vx) * .98;
        cookie.vy += rand(-difficulty.wallChaos, difficulty.wallChaos);
      }

      if (cookie.x > state.width - radius - 10) {
        cookie.x = state.width - radius - 10;
        cookie.vx = -Math.abs(cookie.vx) * .98;
        cookie.vy += rand(-difficulty.wallChaos, difficulty.wallChaos);
      }

      if (cookie.y < radius + 54) {
        cookie.y = radius + 54;
        cookie.vy = Math.abs(cookie.vy) * .94;
        registerUpperCorner(cookie);
        cookie.cornerArmed = false;
      }

      handleSpeakerHit(cookie, difficulty);
    }

    function handleSpeakerHit(cookie, difficulty) {
      const speaker = state.speaker;
      const radius = cookieRadius(cookie);
      const halfW = speaker.w / 2;
      const top = speaker.y - speaker.h / 2;
      const hitX = cookie.x > speaker.x - halfW - radius && cookie.x < speaker.x + halfW + radius;
      const hitY = cookie.y + radius > top && cookie.y - radius < speaker.y + speaker.h / 2;

      if (cookie.vy <= 0 || !hitX || !hitY) return;

      const rawImpact = clamp((cookie.x - speaker.x) / halfW, -1.05, 1.05);
      const perfect = Math.abs(cookie.x - speaker.x) <= getPerfectHalfWidth();
      let impact = rawImpact;
      if (Math.abs(impact) < .12) {
        impact = Math.sign(cookie.vx || (Math.random() - .5)) * rand(.16, .28);
      }

      cookie.y = top - radius;
      const incoming = Math.hypot(cookie.vx, cookie.vy);
      const bounce = clamp(incoming * .64 + 185 + state.combo * 1.4, 315, 610);
      cookie.vy = -bounce * (perfect ? 1.04 : 1);
      cookie.vx = clamp(cookie.vx * .22 + impact * (difficulty.impactBoost + 85), -545, 545);
      if (isMilkActive()) {
        const direction = Math.sign(impact || cookie.vx || 1);
        cookie.vx = clamp(cookie.vx * 1.18 + direction * 58, -620, 620);
        cookie.vy *= 1.04;
        cookie.spin += direction * .55;
      }
      if (Math.abs(cookie.vx) < difficulty.minSideSpeed) {
        cookie.vx = Math.sign(cookie.vx || impact) * difficulty.minSideSpeed;
      }
      cookie.spin += impact * 1.25;
      cookie.touched = true;
      cookie.cornerArmed = true;
      registerBounce(perfect);
    }

    function registerBounce(perfect) {
      state.combo += 1;
      state.bestCombo = Math.max(state.bestCombo, state.combo);
      let horseJustTriggered = false;
      if (perfect) {
        state.perfects += 1;
        state.nonPerfectStreak = 0;
      } else {
        state.nonPerfectStreak += 1;
        if (state.nonPerfectStreak >= 5 && !isHorseActive()) {
          triggerHorseMode();
          horseJustTriggered = true;
          state.nonPerfectStreak = 0;
        }
      }

      let gained = perfect ? 2 : 1;
      if (state.combo % 5 === 0) gained += 1;
      if (isBassDropActive() || isDoubleActive()) gained *= 2;
      if (isMilkActive()) {
        gained += 1;
        state.milkCharges -= 1;
        if (state.milkCharges <= 0) state.milkUntil = 0;
      }
      const rawGained = gained;
      if (isHorseActive()) {
        const halved = rawGained / 2 + state.horsePointCarry;
        gained = Math.floor(halved);
        state.horsePointCarry = halved - gained;
      }
      addScore(gained);
      state.shake = perfect ? 1.2 : .75;
      comboEl.textContent = state.combo;
      const shownGain = isHorseActive() && rawGained === 1 ? "+1/2" : `+${gained}`;
      if (horseJustTriggered) {
        showFlash("CAVALLO: PUNTI /2", 1050);
      } else {
        showFlash(perfect ? `PERFECT ${shownGain}` : shownGain, perfect ? 760 : 520);
      }

      if (state.splitCookies && state.splitCookies.every((cookie) => cookie.touched)) {
        startSplitMerge();
      }
    }

    function addScore(amount) {
      state.score += amount;
      scoreEl.textContent = state.score;

      if (state.score > state.best) {
        state.best = state.score;
        bestEl.textContent = state.best;
        localStorage.setItem("discotti-pong-best", String(state.best));
      }
    }

    function showFlash(text, duration = 650) {
      state.flashText = text;
      state.flashUntil = performance.now() + duration;
    }

    function blockMajorEvents(ms) {
      state.majorEventCooldownUntil = Math.max(state.majorEventCooldownUntil, performance.now() + ms);
    }

    function majorEventsReady() {
      return performance.now() >= state.majorEventCooldownUntil;
    }

    function triggerBassDrop() {
      state.bassDropUntil = performance.now() + 6500;
      state.shake = 1.8;
      showFlash("BASS DROP: PUNTI x2", 1100);
    }

    function updateBassBoost(dt) {
      const boost = state.bassBoost;
      if (!boost && state.elapsed >= state.nextBassAt && !state.splitCookies && !state.splitMerge) {
        spawnBassBoost();
        return;
      }

      if (!boost) return;
      if (performance.now() > boost.until) {
        state.bassBoost = null;
        state.nextBassAt = state.elapsed + 30;
        return;
      }

      boost.x += boost.vx * dt;
      boost.y += boost.vy * dt;
      const minX = boost.r + 16;
      const maxX = state.width - boost.r - 16;
      const minY = 76;
      const maxY = state.height * .58;

      if (boost.x < minX || boost.x > maxX) {
        boost.x = clamp(boost.x, minX, maxX);
        boost.vx *= -1;
      }

      if (boost.y < minY || boost.y > maxY) {
        boost.y = clamp(boost.y, minY, maxY);
        boost.vy *= -1;
      }
    }

    function spawnBassBoost() {
      const angle = rand(-.8, .8);
      const speed = rand(58, 82);
      state.bassBoost = {
        x: rand(state.width * .24, state.width * .76),
        y: rand(state.height * .2, state.height * .46),
        r: clamp(state.width * .024, 8, 11),
        vx: Math.cos(angle) * speed * (Math.random() < .5 ? -1 : 1),
        vy: Math.sin(angle) * speed,
        until: performance.now() + 8500
      };
      showFlash("BASS BOOST", 720);
    }

    function checkBassBoostHit(cookie) {
      const boost = state.bassBoost;
      if (!boost) return;
      const distance = Math.hypot(cookie.x - boost.x, cookie.y - boost.y);
      if (distance > cookieRadius(cookie) + boost.r) return;

      state.bassBoost = null;
      state.nextBassAt = state.elapsed + 30;
      triggerBassDrop();
    }

    function registerUpperCorner(cookie) {
      if (!cookie.cornerArmed) return;
      const leftPocket = getCornerPocket("left");
      const rightPocket = getCornerPocket("right");
      const hitLeft = Math.hypot(cookie.x - leftPocket.x, cookie.y - leftPocket.y) <= leftPocket.r;
      const hitRight = Math.hypot(cookie.x - rightPocket.x, cookie.y - rightPocket.y) <= rightPocket.r;
      if (!hitLeft && !hitRight) return;

      const cornerGain = isDelayActive() ? 3 : 1;
      state.cornerStreak += cornerGain;
      state.cornerChainUntil = performance.now() + 10000;
      state.cornerPulseSide = hitLeft ? "left" : "right";
      state.cornerPulseUntil = performance.now() + 520;
      cookie.vx += hitLeft ? Math.abs(cookie.vy) * .18 : -Math.abs(cookie.vy) * .18;
      cookie.vy += 55;
      if (state.cornerStreak >= 5) {
        state.cornerBurstSide = hitLeft ? "left" : "right";
        state.cornerBurstUntil = performance.now() + 900;
        state.cornerStreak = 0;
        state.cornerChainUntil = 0;
        addScore(10);
        showFlash(isDelayActive() ? "DELAY ANGOLO +10" : "ANGOLO DISCOTTI +10", 950);
        state.shake = 2;
      }
    }

    function updateCornerChain() {
      if (state.cornerStreak > 0 && performance.now() > state.cornerChainUntil) {
        state.cornerStreak = 0;
        state.cornerChainUntil = 0;
      }
    }

    function getCornerPocket(side) {
      const visualR = clamp(state.width * .065, 23, 32);
      const hitR = clamp(state.width * .105, 38, 50);
      return {
        x: side === "left" ? 8 : state.width - 8,
        y: 53,
        r: hitR,
        visualR
      };
    }

    function maybeSpawnPerk() {
      if (state.perk || state.score < state.nextPerkAt || state.splitCookies || state.splitMerge || isLsdActive() || !majorEventsReady()) return;
      state.perk = {
        x: rand(state.width * .22, state.width * .78),
        y: rand(state.height * .22, state.height * .48),
        r: clamp(state.width * .035, 12, 17),
        type: ["milk", "slow", "bonus", "delay"][Math.floor(Math.random() * 4)],
        until: performance.now() + 7600
      };
      state.nextPerkAt += rand(24, 34);
    }

    function checkPerkHit(cookie) {
      const perk = state.perk;
      if (!perk) return;
      if (performance.now() > perk.until) {
        state.perk = null;
        return;
      }

      const distance = Math.hypot(cookie.x - perk.x, cookie.y - perk.y);
      if (distance > cookieRadius(cookie) + perk.r) return;

      if (perk.type === "milk") {
        state.milkUntil = performance.now() + 8500;
        state.milkCharges = 3;
        showFlash("LATTE+", 850);
      } else if (perk.type === "slow") {
        state.slowUntil = performance.now() + 6000;
        showFlash("SLOW GROOVE", 850);
      } else if (perk.type === "delay") {
        state.delayUntil = performance.now() + 10000;
        showFlash("DELAY x3", 850);
      } else {
        state.doubleUntil = performance.now() + 5000;
        showFlash("DISCOTTI x2", 850);
      }
      state.perk = null;
      state.shake = 1.3;
    }

    function maybeStartSplit() {
      if (state.splitCookies || state.splitMerge || isLsdActive() || !majorEventsReady() || state.score < state.splitAtScore) return;
      state.splitAtScore += 58;
      const c = state.cookie;
      const speedY = -Math.max(260, Math.abs(c.vy) * .72);
      state.splitCookies = [
        { x: c.x - c.r * .45, y: c.y, r: c.r * .92, vx: -Math.max(190, Math.abs(c.vx) + 85), vy: speedY, spin: c.spin, touched: false, cornerArmed: false },
        { x: c.x + c.r * .45, y: c.y, r: c.r * .92, vx: Math.max(190, Math.abs(c.vx) + 85), vy: speedY, spin: c.spin, touched: false, cornerArmed: false }
      ];
      state.perk = null;
      state.bassBoost = null;
      state.nextBassAt = state.elapsed + 30;
      blockMajorEvents(1600);
      showFlash("DOPPIO BISCOTTO", 1100);
    }

    function startSplitMerge() {
      if (!state.splitCookies || state.splitMerge) return;
      const targetX = state.width / 2;
      const targetY = state.cookie.r + 72;
      state.splitMerge = {
        start: performance.now(),
        duration: 720,
        targetX,
        targetY,
        from: state.splitCookies.map((cookie) => ({ x: cookie.x, y: cookie.y, spin: cookie.spin }))
      };
      showFlash("RIUNIONE", 680);
    }

    function updateSplitMerge() {
      if (!state.splitMerge || !state.splitCookies) {
        state.splitMerge = null;
        return;
      }

      const merge = state.splitMerge;
      const t = clamp((performance.now() - merge.start) / merge.duration, 0, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      state.splitCookies.forEach((cookie, index) => {
        const from = merge.from[index];
        const lift = Math.sin(t * Math.PI) * 42;
        cookie.x = from.x + (merge.targetX - from.x) * eased;
        cookie.y = from.y + (merge.targetY - from.y) * eased - lift;
        cookie.spin += .16;
      });

      if (t >= 1) triggerSplitFinale(merge.targetX, merge.targetY);
    }

    function triggerSplitFinale(x, y) {
      state.cookie = {
        x,
        y,
        r: clamp(state.width * .047, 15, 25),
        vx: (Math.random() < .5 ? -1 : 1) * rand(180, 310),
        vy: Math.max(280, state.height * .34),
        spin: 0,
        cornerArmed: false
      };
      state.splitCookies = null;
      state.splitMerge = null;
      addScore(4);
      state.nextLsdAtScore = Math.max(state.nextLsdAtScore, state.score + 18);
      blockMajorEvents(5200);
      showFlash("RIUNITI +4", 900);
      state.shake = 1.8;
    }

    function maybeStartLsd() {
      if (isLsdActive() || state.splitCookies || state.splitMerge || !majorEventsReady() || state.score < state.nextLsdAtScore) return;
      state.nextLsdAtScore += 72;
      state.lsdUntil = performance.now() + 8200;
      state.lsdDecoys = Array.from({ length: 5 }, () => ({
        x: rand(state.width * .18, state.width * .82),
        y: rand(state.height * .16, state.height * .56),
        r: state.cookie.r * rand(.86, 1.06),
        vx: rand(-42, 42),
        vy: rand(-28, 34),
        spin: rand(-2, 2)
      }));
      state.perk = null;
      state.bassBoost = null;
      state.nextBassAt = state.elapsed + 30;
      blockMajorEvents(9000);
      showFlash("FASE LSD", 1100);
    }

    function updateLsdDecoys(dt) {
      if (!isLsdActive()) {
        state.lsdDecoys = [];
        return;
      }

      state.lsdDecoys.forEach((decoy, index) => {
        decoy.x += (decoy.vx + Math.sin(state.elapsed * 3 + index) * 18) * dt;
        decoy.y += (decoy.vy + Math.cos(state.elapsed * 2.4 + index) * 14) * dt;
        decoy.spin += dt * (index % 2 ? -2.4 : 2.4);

        const minX = decoy.r + 14;
        const maxX = state.width - decoy.r - 14;
        const minY = 74;
        const maxY = state.height - state.speaker.h - 112;
        if (decoy.x < minX || decoy.x > maxX) {
          decoy.x = clamp(decoy.x, minX, maxX);
          decoy.vx *= -1;
        }
        if (decoy.y < minY || decoy.y > maxY) {
          decoy.y = clamp(decoy.y, minY, maxY);
          decoy.vy *= -1;
        }
      });
    }

    function triggerHorseMode() {
      const now = performance.now();
      state.horseUntil = now + 5000;
      state.horseFadeUntil = now + 6400;
      state.horseHorde = Array.from({ length: 26 }, (_, index) => ({
        x: rand(-state.width * .12, state.width * 1.05),
        y: rand(state.height * .18, state.height * .7),
        vx: rand(18, 46) * (index % 2 ? 1 : -1),
        drift: rand(.7, 1.8),
        size: 22 + (index % 5) * 4,
        phase: rand(0, Math.PI * 2)
      }));
      playHorseNeigh();
      showFlash("CAVALLO: PUNTI /2", 1050);
    }

    function updateHorseHorde(dt) {
      if (!isHorseVisible()) {
        state.horseHorde = [];
        state.horsePointCarry = 0;
        return;
      }

      if (!isHorseActive()) state.horsePointCarry = 0;

      state.horseHorde.forEach((horse) => {
        horse.x += horse.vx * dt;
        horse.y += Math.sin(state.elapsed * horse.drift + horse.phase) * 7 * dt;
        if (horse.x < -60) horse.x = state.width + rand(10, 70);
        if (horse.x > state.width + 60) horse.x = -rand(10, 70);
      });
    }

    function drawBackground() {
      const bg = ctx.createLinearGradient(0, 0, 0, state.height);
      const bass = isBassDropActive() ? .12 + Math.sin(state.elapsed * 18) * .05 : 0;
      bg.addColorStop(0, bass ? "#eef4ff" : "#ffffff");
      bg.addColorStop(.52, "#f8fbff");
      bg.addColorStop(1, bass ? "#d6e4ff" : "#eaf1ff");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, state.width, state.height);

      if (logo.complete && logo.naturalWidth) {
        const size = Math.min(Math.max(state.width * .82, 270), state.height * .64);
        const x = (state.width - size) / 2 - state.width * .035;
        const y = state.height * .43 - size / 2;
        ctx.save();
        ctx.globalAlpha = .16;
        ctx.drawImage(logo, x, y, size, size);
        ctx.restore();
      }

      ctx.strokeStyle = "rgba(11, 42, 146, .22)";
      ctx.lineWidth = 2;
      ctx.strokeRect(10, 60, state.width - 20, state.height - 132);
      drawCornerPockets();

      if (bass) {
        ctx.save();
        ctx.globalAlpha = bass;
        ctx.fillStyle = "#0b2a92";
        ctx.fillRect(0, 0, state.width, state.height);
        ctx.restore();
      }
    }

    function drawFlashText() {
      const remaining = state.flashUntil - performance.now();
      if (remaining <= 0 || !state.flashText) return;

      const y = Math.max(112, state.height * .22);
      const width = Math.min(190, state.width * .62);
      ctx.save();
      ctx.globalAlpha = clamp(remaining / 500, 0, 1);
      ctx.fillStyle = "rgba(255, 255, 255, .88)";
      ctx.shadowColor = "rgba(11, 42, 146, .34)";
      ctx.shadowBlur = 18;
      roundRect(state.width / 2 - width / 2, y - 19, width, 34, 8);
      ctx.fill();
      ctx.fillStyle = "#0b2a92";
      ctx.font = "900 17px Inter, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.shadowBlur = 0;
      ctx.fillText(state.flashText, state.width / 2, y + 6);
      ctx.restore();
    }

    function drawCookie(cookie, options = {}) {
      const c = cookie || state.cookie;
      const radius = cookieRadius(c);
      if (options.delayTrail) drawDelayTrail(c, radius);
      ctx.save();
      if (options.alpha) ctx.globalAlpha = options.alpha;
      ctx.translate(c.x + rand(-state.shake, state.shake), c.y + rand(-state.shake, state.shake));
      ctx.rotate(c.spin);

      const grad = ctx.createRadialGradient(-radius * .35, -radius * .45, radius * .2, 0, 0, radius);
      grad.addColorStop(0, "#ffd98b");
      grad.addColorStop(.72, "#c98636");
      grad.addColorStop(1, "#8f5424");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#583019";
      const chips = [[-.42, -.28, .18], [.16, -.38, .15], [.42, .05, .17], [-.1, .18, .14], [-.38, .38, .13], [.17, .42, .12]];
      chips.forEach(([x, y, r]) => {
        ctx.beginPath();
        ctx.arc(x * radius, y * radius, r * radius, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.strokeStyle = "rgba(255, 244, 204, .55)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, radius - 3, .25, Math.PI * 1.34);
      ctx.stroke();
      if (options.originalMark) {
        ctx.strokeStyle = "#0b2a92";
        ctx.lineWidth = 3;
        ctx.shadowColor = "rgba(11, 42, 146, .38)";
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(0, 0, radius + 5, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = "#0b2a92";
        ctx.beginPath();
        ctx.arc(radius * .42, -radius * .48, radius * .16, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawDelayTrail(cookie, radius) {
      if (!isDelayActive()) return;

      const speed = Math.hypot(cookie.vx || 0, cookie.vy || 0);
      const dirX = speed > 1 ? -(cookie.vx || 0) / speed : 0;
      const dirY = speed > 1 ? -(cookie.vy || 0) / speed : 1;
      const ghosts = [
        { distance: radius * 1.45, alpha: .34, scale: .94 },
        { distance: radius * 2.65, alpha: .16, scale: .86 }
      ];

      ghosts.reverse().forEach((ghost) => {
        const x = cookie.x + dirX * ghost.distance;
        const y = cookie.y + dirY * ghost.distance;
        const r = radius * ghost.scale;

        ctx.save();
        ctx.globalAlpha = ghost.alpha;
        ctx.translate(x, y);
        ctx.rotate(cookie.spin * .82);
        ctx.shadowColor = "rgba(11, 42, 146, .28)";
        ctx.shadowBlur = 8;

        const grad = ctx.createRadialGradient(-r * .35, -r * .45, r * .2, 0, 0, r);
        grad.addColorStop(0, "#fff0bf");
        grad.addColorStop(.72, "#c98636");
        grad.addColorStop(1, "#8f5424");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#583019";
        [[-.42, -.28, .18], [.16, -.38, .15], [.42, .05, .17], [-.1, .18, .14]].forEach(([chipX, chipY, chipR]) => {
          ctx.beginPath();
          ctx.arc(chipX * r, chipY * r, chipR * r, 0, Math.PI * 2);
          ctx.fill();
        });

        ctx.strokeStyle = "rgba(11, 42, 146, .45)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, r + 3, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      });
    }

    function drawCookies() {
      if (isLsdActive()) {
        state.lsdDecoys.forEach((cookie) => drawCookie(cookie, { alpha: .48 }));
      }
      const cookies = state.splitCookies || [state.cookie];
      cookies.forEach((cookie) => drawCookie(cookie, {
        delayTrail: !isLsdActive(),
        originalMark: isLsdActive() && !state.splitCookies
      }));
    }

    function drawHorseHorde() {
      if (!isHorseVisible()) return;

      const now = performance.now();
      const activeAlpha = .06 + clamp((state.horseUntil - now) / 5000, 0, 1) * .08;
      const fadeAlpha = Math.max(0, state.horseFadeUntil - now) / Math.max(1, state.horseFadeUntil - state.horseUntil);
      ctx.save();
      ctx.globalAlpha = isHorseActive() ? activeAlpha : activeAlpha * fadeAlpha;
      state.horseHorde.forEach((horse) => {
        const sprite = getHorseSprite(horse.size);
        ctx.save();
        ctx.translate(horse.x, horse.y);
        ctx.rotate(Math.sin(state.elapsed * horse.drift + horse.phase) * .08);
        ctx.drawImage(sprite, -sprite.width / 2, -sprite.height / 2);
        ctx.restore();
      });
      ctx.restore();
    }

    function getHorseSprite(size) {
      const key = Math.round(size);
      if (horseSpriteCache.has(key)) return horseSpriteCache.get(key);

      const canvas = document.createElement("canvas");
      const box = Math.ceil(key * 1.55);
      canvas.width = box;
      canvas.height = box;
      const spriteCtx = canvas.getContext("2d");
      spriteCtx.font = `${key}px serif`;
      spriteCtx.textAlign = "center";
      spriteCtx.textBaseline = "middle";
      spriteCtx.fillText(String.fromCodePoint(0x1F40E), box / 2, box / 2 + key * .04);
      horseSpriteCache.set(key, canvas);
      return canvas;
    }

    function drawCornerPockets() {
      ["left", "right"].forEach((side) => {
        const pocket = getCornerPocket(side);
        const pulse = side === state.cornerPulseSide ? clamp((state.cornerPulseUntil - performance.now()) / 520, 0, 1) : 0;
        const burst = side === state.cornerBurstSide && performance.now() < state.cornerBurstUntil;
        const filled = burst ? 5 : Math.min(5, state.cornerStreak);
        const r = pocket.visualR;
        ctx.save();
        ctx.translate(pocket.x, pocket.y);
        if (pulse) {
          ctx.shadowColor = "rgba(201, 134, 54, .42)";
          ctx.shadowBlur = 14 * pulse;
        }
        ctx.fillStyle = "rgba(255, 255, 255, .78)";
        ctx.strokeStyle = "rgba(11, 42, 146, .36)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, r + pulse * 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "rgba(11, 42, 146, .08)";
        ctx.beginPath();
        ctx.arc(0, 0, r * .55, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        const railX = side === "left" ? 18 : state.width - 18;
        const railY = Math.max(122, state.height * .17);
        for (let index = 0; index < 5; index += 1) {
          const active = index < filled;
          const x = railX - pocket.x;
          const y = railY + index * 13 - pocket.y;
          ctx.fillStyle = active ? (burst ? "#ffd98b" : "#c98636") : "rgba(201, 134, 54, .28)";
          ctx.beginPath();
          ctx.arc(x, y, active ? 3.8 + pulse * 1.2 : 2.5, 0, Math.PI * 2);
          ctx.fill();
          if (active) {
            ctx.fillStyle = "#583019";
            ctx.beginPath();
            ctx.arc(x + 1.2, y - .8, 1, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        if (filled > 0) {
          ctx.strokeStyle = `rgba(201, 134, 54, ${.24 + filled * .09})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(railX - pocket.x, railY - 8 - pocket.y);
          ctx.lineTo(railX - pocket.x, railY + 60 - pocket.y);
          ctx.stroke();
        }
        ctx.restore();
      });
    }

    function drawPerk() {
      const perk = state.perk;
      if (!perk) return;

      const pulse = 1 + Math.sin(state.elapsed * 8) * .08;
      ctx.save();
      ctx.translate(perk.x, perk.y);
      ctx.scale(pulse, pulse);
      ctx.globalAlpha = clamp((perk.until - performance.now()) / 900, .35, 1);
      ctx.fillStyle = perk.type === "milk" ? "rgba(255,255,255,.96)" : "rgba(255,255,255,.88)";
      ctx.strokeStyle = "#0b2a92";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, perk.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#0b2a92";
      ctx.font = "900 9px Inter, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(perk.type === "milk" ? "L+" : perk.type === "slow" ? "S" : perk.type === "delay" ? "DLY" : "x2", 0, 1);
      ctx.restore();
    }

    function drawBassBoost() {
      const boost = state.bassBoost;
      if (!boost) return;

      const pulse = 1 + Math.sin(state.elapsed * 10) * .1;
      ctx.save();
      ctx.translate(boost.x, boost.y);
      ctx.scale(pulse, pulse);
      ctx.globalAlpha = clamp((boost.until - performance.now()) / 700, .35, 1);
      ctx.fillStyle = "rgba(11, 42, 146, .92)";
      ctx.beginPath();
      ctx.arc(0, 0, boost.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(255, 255, 255, .86)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, boost.r + 4, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = "#fff";
      ctx.font = "900 10px Inter, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("B", 0, .5);
      ctx.restore();
    }

    function drawBassDropStatus() {
      if (!isBassDropActive()) return;

      const remaining = Math.ceil((state.bassDropUntil - performance.now()) / 1000);
      ctx.save();
      ctx.fillStyle = "rgba(11, 42, 146, .9)";
      roundRect(state.width / 2 - 64, 76, 128, 30, 8);
      ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.font = "900 12px Inter, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(`PUNTI x2 ${remaining}s`, state.width / 2, 91);
      ctx.restore();
    }

    function drawSpeaker() {
      const s = state.speaker;
      const x = s.x - s.w / 2;
      const y = s.y - s.h / 2;

      ctx.save();
      ctx.translate(rand(-state.shake, state.shake), rand(-state.shake, state.shake));

      ctx.fillStyle = "#2a2d31";
      roundRect(x, y, s.w, s.h, 8);
      ctx.fill();

      ctx.fillStyle = "#111315";
      roundRect(x + 8, y + 5, s.w - 16, s.h - 10, 5);
      ctx.fill();

      const perfectW = getPerfectHalfWidth() * 2;
      ctx.save();
      ctx.shadowColor = "rgba(255, 241, 168, .75)";
      ctx.shadowBlur = 12;
      ctx.fillStyle = "rgba(255, 246, 190, .48)";
      roundRect(s.x - perfectW / 2, y + 5, perfectW, s.h - 10, 5);
      ctx.fill();
      ctx.strokeStyle = "rgba(255, 255, 255, .72)";
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();

      const coneR = s.h * .34;
      drawCone(x + s.w * .32, s.y, coneR);
      drawCone(x + s.w * .68, s.y, coneR);

      ctx.fillStyle = "#d7dce4";
      roundRect(s.x - s.w * .18, y - 5, s.w * .36, 5, 4);
      ctx.fill();
      ctx.restore();
    }

    function drawCone(x, y, r) {
      ctx.fillStyle = "#3d444a";
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#151719";
      ctx.beginPath();
      ctx.arc(x, y, r * .58, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(255, 255, 255, .2)";
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.arc(x, y, r * .82, 0, Math.PI * 2);
      ctx.stroke();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function loop(now) {
      if (!state.running) return;
      const dt = Math.min((now - state.last) / 1000, .033);
      state.last = now;
      update(dt);
      drawBackground();
      drawHorseHorde();
      drawPerk();
      drawBassBoost();
      drawSpeaker();
      drawCookies();
      drawBassDropStatus();
      drawFlashText();
      requestAnimationFrame(loop);
    }

    resize();
    loadLeaderboard();
    drawBackground();
    drawHorseHorde();
    drawPerk();
    drawBassBoost();
    drawSpeaker();
    drawCookies();
    drawBassDropStatus();
    drawFlashText();
  </script>
</body>
</html>
